<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,"Noto Sans JP",sans-serif;
  background:#f9f6f0;display:flex;align-items:center;
  justify-content:center;min-height:100vh;min-height:-webkit-fill-available;
  padding:max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
}
.box{
  background:#fff;border-radius:12px;padding:28px 22px;
  text-align:center;max-width:320px;width:100%;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.spinner{
  width:32px;height:32px;border:2px solid #e8e0d0;
  border-top-color:#b8973a;border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:13px;color:#888;line-height:1.8;white-space:pre-wrap}
.err{font-size:13px;color:#c0392b;line-height:1.8;white-space:pre-wrap}
.name{font-size:15px;color:#1a1612;font-weight:600;margin-bottom:8px}
.manual{display:none;margin-top:16px}
.manual input{
  width:100%;padding:10px 12px;border:1px solid #d4c9b0;border-radius:8px;
  font-size:14px;font-family:inherit;outline:none;
}
.manual input:focus{border-color:#b8973a}
.manual button{
  width:100%;margin-top:10px;padding:12px;
  background:#2d7a3c;color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
}
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">認証中...</div>
  <div class="manual" id="manual">
    <input id="nameInput" type="text" placeholder="お名前を入力してください">
    <button onclick="submitWithName()">確認画面へ進む</button>
  </div>
</div>

<script>
const LIFF_ID = "2009409928-oFHGILyB"
const GAS_URL = "https://script.google.com/macros/s/AKfycbyfed2jcGYIhOeJ9UJW1oMTFUeMi_h7RR2rr3i8vKAllGeuoWlIDC0r5lFcwFxPIQE/exec"

let sid = ""

function goToGas(staffName) {
  if (!sid) { showError("セッションIDが取得できませんでした"); return }
  location.href = GAS_URL + "?sid=" + encodeURIComponent(sid) + "&staffName=" + encodeURIComponent(staffName)
}

function submitWithName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { alert("お名前を入力してください"); return }
  goToGas(name)
}

function showError(msg) {
  document.getElementById("spinner").style.display = "none"
  document.getElementById("msg").className = "err"
  document.getElementById("msg").textContent = msg
}

function showManual() {
  document.getElementById("spinner").style.display = "none"
  document.getElementById("msg").className = "msg"
  document.getElementById("msg").textContent = "お名前を入力して進んでください。"
  document.getElementById("manual").style.display = "block"
}

liff.init({ liffId: LIFF_ID })
  .then(function() {
    // SID取得：複数の場所から段階的に試みる
    function extractSid(str) {
      if (!str) return ""
      try {
        // URLエンコードされている場合とそうでない場合の両方を試みる
        const decoded = decodeURIComponent(str)
        return new URLSearchParams(decoded).get("sid") || new URLSearchParams(str).get("sid") || ""
      } catch(e) {
        try { return new URLSearchParams(str).get("sid") || "" } catch(e2) { return "" }
      }
    }

    // ① 現在のURLのクエリパラメータから取得（最優先）
    sid = new URLSearchParams(window.location.search).get("sid") || ""

    // ② liff.getContext().liffState から取得
    if (!sid) {
      try {
        const ctx = liff.getContext()
        if (ctx && ctx.liffState) sid = extractSid(ctx.liffState)
      } catch(e) {}
    }

    // ③ URLのhashから取得（liff.line.me/?liff.state=... 形式）
    if (!sid) {
      try {
        const hash = window.location.hash.replace(/^#/, "")
        sid = extractSid(hash)
      } catch(e) {}
    }

    if (!sid) {
      showError("セッションIDが見つかりません\nもう一度ボタンをタップしてください\n\ncontext:" + JSON.stringify(liff.getContext()))
      return
    }

    if (!liff.isLoggedIn()) { liff.login(); return }
    return liff.getProfile()
  })
  .then(function(profile) {
    if (!profile) return
    const staffName = profile.displayName
    document.getElementById("spinner").style.display = "none"
    document.getElementById("msg").className = "name"
    document.getElementById("msg").textContent = staffName + " さん"
    setTimeout(function() { goToGas(staffName) }, 800)
  })
  .catch(function(err) { showManual() })
</script>
</body>
</html>
