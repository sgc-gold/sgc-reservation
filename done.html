<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>完了</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}
body {
  font-family: -apple-system, "BlinkMacSystemFont", "Hiragino Sans", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f9f6f0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
}
.box {
  background: #fff;
  border-radius: 24px;
  /* 4. paddingをrem単位にし、画面幅に合わせて調整 */
  padding: 3rem 1.5rem;
  text-align: center;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.icon { font-size: 5rem; margin-bottom: 1.5rem; display: block; line-height: 1; }
h2 { font-size: 1.5rem; font-weight: 700; color: #1a1612; margin-bottom: 1.2rem; }
.info {
  /* 5. 文字の視認性を高めるため背景色と余白を調整 */
  font-size: 1.1rem; color: #555; line-height: 1.8;
  padding: 1.5rem 1rem; background: #fdfbf7;
  border: 1px solid #f0ede8;
  border-radius: 16px; margin-bottom: 1.5rem;
}
.gold { color: #b8973a; font-weight: 700; font-size: 1.3rem; display: block; margin-bottom: 0.3rem; }
.staff { color: #1a1612; font-weight: 600; font-size: 0.95rem; }
.note { font-size: 0.9rem; color: #888; margin-top: 1rem; }
.badge {
  display: inline-block; padding: 0.6rem 1.5rem;
  border-radius: 30px; background: #f0ede8;
  color: #6b6560; font-size: 1rem;
  margin-bottom: 1.5rem; font-weight: 600;
}
p { font-size: 1.1rem; color: #777; line-height: 1.6; }
</style>
</head>
<body>
<div class="box" id="content">読み込み中...</div>

<script>
const p      = new URLSearchParams(location.search)
const type   = p.get("type")   || ""
const title  = p.get("title")  || ""
const name   = p.get("name")   || ""
const date   = p.get("date")   || ""
const staff  = p.get("staff")  || ""
const status = p.get("status") || ""

// ⑥ XSS対策：ユーザー入力値をテキストノードとして安全に挿入するヘルパー
function t(str) {
  const node = document.createTextNode(str)
  const span = document.createElement("span")
  span.appendChild(node)
  return span.outerHTML
}

const box = document.getElementById("content")

if (type === "success") {
  const staffLine = staff ? '<br><span class="staff">操作者：' + t(staff) + '</span>' : ''
  const dateLine  = date  ? '<div style="font-size:0.9rem; color:#999; margin-top:8px;">' + t(date) + '</div>' : ''
  box.innerHTML =
    '<span class="icon">🎉</span>' +
    '<h2>' + t(title) + '</h2>' +
    '<div class="info"><span class="gold">' + t(name) + '</span> 様' +
    dateLine +
    staffLine + '</div>' +
    '<p class="note">顧客のLINEに通知しました</p>'
} else if (type === "done") {
  box.innerHTML =
    '<span class="icon">⚠️</span>' +
    '<h2>すでに処理済みです</h2>' +
    '<div class="badge">' + t(status) + '</div>' +
    '<p><strong>' + t(name) + '</strong> 様<br><small>' + t(date) + '</small></p>'
} else {
  box.innerHTML = '<p>不明なページです</p>'
}
</script>
</body>
</html>
