<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375,initial-scale=1,user-scalable=no">
<title>完了</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #f9f6f0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.box {
  background: #fff;
  border-radius: 20px;
  padding: 40px 28px;
  text-align: center;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}
.icon { font-size: 64px; margin-bottom: 20px; display: block; line-height: 1; }
h2 { font-size: 22px; font-weight: 700; color: #1a1612; margin-bottom: 18px; letter-spacing: 0.02em; }
.info {
  font-size: 16px; color: #888; line-height: 2.4;
  padding: 16px 20px; background: #f9f6f0;
  border-radius: 12px; margin-bottom: 18px;
}
.gold { color: #b8973a; font-weight: 700; font-size: 18px; }
.staff { color: #1a1612; font-weight: 600; }
.note { font-size: 13px; color: #bbb; line-height: 1.8; }

/* すでに処理済み */
.badge {
  display: inline-block; padding: 8px 20px;
  border-radius: 20px; background: #f0ede8;
  color: #6b6560; font-size: 15px;
  margin-bottom: 20px; font-weight: 500;
}
p { font-size: 16px; color: #aaa; line-height: 2.2; }
</style>
</head>
<body>
<div class="box" id="content">読み込み中...</div>

<script>
const p = new URLSearchParams(location.search)
const type   = p.get("type")   // "success" or "done"
const title  = decodeURIComponent(p.get("title")  || "")
const name   = decodeURIComponent(p.get("name")   || "")
const date   = decodeURIComponent(p.get("date")   || "")
const staff  = decodeURIComponent(p.get("staff")  || "")
const status = decodeURIComponent(p.get("status") || "")

const box = document.getElementById("content")

if (type === "success") {
  const staffLine = staff
    ? '<br><span class="staff">操作者：' + staff + '</span>'
    : ''
  box.innerHTML =
    '<span class="icon">🎉</span>' +
    '<h2>' + title + '</h2>' +
    '<div class="info">' +
      '<span class="gold">' + name + '</span> 様<br>' +
      date + staffLine +
    '</div>' +
    '<p class="note">顧客のLINEに通知しました</p>'
} else if (type === "done") {
  box.innerHTML =
    '<span class="icon">⚠️</span>' +
    '<h2>すでに処理済みです</h2>' +
    '<div class="badge">' + status + '</div>' +
    '<p>' + name + ' 様<br>' + date + '</p>'
} else {
  box.innerHTML = '<p>不明なページです</p>'
}
</script>
</body>
</html>
